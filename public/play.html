<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Network</title>
    <script src="/scram_es/scramjet.config.js"></script>
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js" defer></script>
    <script src="/epoxy/index.js" defer></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <style>
        @import url(https://fonts.googleapis.com/css?family=Inter:100,200,300,regular,500,600,700,800,900);

        * {
            font-family: Inter;
        }

        body {
            background: linear-gradient(to top, rgb(58, 117, 204), rgb(86, 222, 240));
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ffffff;
        }

        .menu {
            position: fixed;
            top: 15px;
            left: calc(25% - 20px);
            width: 50%;
            padding: 20px;
            padding-top: 20px;
            padding-bottom: 20px;
            align-items: center;
            border-radius: 15px;
            background-color: rgb(0, 0, 0, 0.7);
            box-shadow: 0px 0px 10px 0px rgba(0, 0, 0, 0.5);
            color: #ffffff;
            text-align: center;
            line-height: 10px;
        }

        .menu img {
            position: absolute;
            top: 5px;
            left: 0;
            width: 40px;
            height: 40px;
        }

        center div {
            width: 80%;
            padding: 20px;
            padding-top: 20px;
            padding-bottom: 20px;
            background-color: rgb(0, 0, 0, 0.7);
            box-shadow: 0px 0px 10px 0px rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            color: #ffffff;
            text-align: center;
            line-height: 10px;
        }

        center div iframe {
            width: 100%;
            border: none;
            height: clamp(400px, 65vh, 900px);
        }

        @media (min-width: 1200px) {
            center div iframe {
                height: clamp(500px, 72vh, 1100px);
            }

            center div {
                width: 88%;
            }
        }

        @media (min-width: 1600px) {
            center div {
                width: 92%;
            }
        }

        .frame-toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
            padding: 6px 10px;
            background-color: rgb(0, 0, 0, 0.7);
            box-shadow: 0px 0px 10px 0px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }

        .frame-toolbar .material-symbols-rounded {
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
            border-radius: 8px;
            transition: background 0.15s;
            user-select: none;
            color: #ffffff;
        }

        .frame-toolbar .material-symbols-rounded:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .frame-toolbar .material-symbols-rounded:active {
            background: rgba(255, 255, 255, 0.32);
        }

        .frame-toolbar .material-symbols-rounded.disabled {
            opacity: 0.35;
            cursor: default;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="menu">
        <img onclick="window.location='index.html'" src="./logo.png">
        <div style="float: right;">
            <span style="user-select: none; cursor: pointer;" onclick="window.location='games.html'">Games</span>
            <span>/</span>
            <span style="user-select: none; cursor: pointer;" onclick="window.location='chat.html'">Chat</span>
            <span>/</span>
            <span style="user-select: none; cursor: pointer;" onclick="window.location='links.html'">Links</span>
        </div>
    </div>

    <div style="margin-top: 100px;">
        <center>
            <div id="frame-container">
              
            </div>
            <br>
              <div class="frame-toolbar" id="frame-toolbar">
                    <span class="material-symbols-rounded disabled" id="btn-back" title="Back" onclick="iframeBack()">arrow_back</span>
                    <span class="material-symbols-rounded disabled" id="btn-forward" title="Forward" onclick="iframeForward()">arrow_forward</span>
                    <span class="material-symbols-rounded disabled" id="btn-reload" title="Reload" onclick="iframeReload()">refresh</span>
                    <span class="material-symbols-rounded disabled" id="btn-fullscreen" title="Fullscreen" onclick="iframeFullscreen()">fullscreen</span>
                </div>
        </center>
    </div>
    <script>

        let scramjetFrame = null;
        let scramjet = null;

        function getURLParameter(name) {
            const regex = new RegExp(`[\\?&]${name}=([^&#]*)`);
            const results = regex.exec(location.search);
            return results ? atob(results[1]) : "";
        }


        function buildSearchUrl(input) {
            if (
                !input.startsWith("http://") &&
                !input.startsWith("https://") &&
                input.includes(".")
            ) {
                input = "https://" + input;
            }
            return new URL(input).toString();
        }

        function setToolbarEnabled(enabled) {
            ["btn-back","btn-forward","btn-reload","btn-fullscreen"].forEach(id => {
                document.getElementById(id).classList.toggle("disabled", !enabled);
            });
        }

        function iframeBack() {
            if (scramjetFrame) {
                scramjetFrame.frame.contentWindow.history.back();
            }
        }
        function iframeForward() {
            if (scramjetFrame) {
                scramjetFrame.frame.contentWindow.history.forward();
            }
        }
        function iframeReload() {
            if (scramjetFrame) {
                scramjetFrame.frame.contentWindow.location.reload();
            }
        }
        function iframeFullscreen() {
            const frame = document.getElementById("frame");
            if (frame) {
                if (frame.requestFullscreen) frame.requestFullscreen();
                else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
            }
        }

        let eruda_status = 0;

        const stockSW = "/scram_es/sw.js";

        const swAllowedHostnames = ["localhost", "127.0.0.1"];

        async function registerSW() {
            if (!navigator.serviceWorker) {
                if (
                    location.protocol !== "https:" &&
                    !swAllowedHostnames.includes(location.hostname)
                )
                    throw new Error("Service workers cannot be registered without https.");

                throw new Error("Your browser doesn't support service workers.");
            }

            await navigator.serviceWorker.register(stockSW, { scope: "/" });
        }

        document.addEventListener("DOMContentLoaded", async () => {

            while (typeof BareMux === "undefined") {
                await new Promise((resolve) => setTimeout(resolve, 100));
            }

            const { ScramjetController } = $scramjetLoadController();

            scramjet = new ScramjetController(__scramjet$config);

            let url = getURLParameter("url") || "";

            await scramjet.init();

            const connection = new BareMux.BareMuxConnection("/baremux/worker.js");

            try {
                await registerSW();
                console.log("Registered!");
            } catch (err) {
                console.error("Failed to register service worker:", err);
            }

            const wispUrl = (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/wisp/";

            await connection.setTransport("/epoxy/index.mjs", [
                {
                    wisp: wispUrl,
                },
            ]);

            if (url) {
                const finalUrl = buildSearchUrl(url);

                scramjetFrame = scramjet.createFrame();
                scramjetFrame.frame.id = "frame";
                scramjetFrame.frame.classList.add("active");

                scramjetFrame.frame.addEventListener("load", () => {
                    setToolbarEnabled(true);
                }, { once: false });

                document.getElementById("frame-container").appendChild(scramjetFrame.frame);

                scramjetFrame.go(finalUrl);
            }
        });

    </script>
    <script src="./scripts/global.js"></script>
</body>

</html>
