<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Network</title>
    <style>
        @import url(https://fonts.googleapis.com/css?family=Inter:100,200,300,regular,500,600,700,800,900);

        *{
            font-family: Inter;
        }

        body {
            background: linear-gradient(to top, rgb(58, 117, 204), rgb(86, 222, 240));
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ffffff;
        }

        .menu{
            position: fixed;
            top: 15px;
            left: calc(25% - 20px);
            width: 50%;
            padding: 20px;
            padding-top: 20px;
            padding-bottom: 20px;
            align-items: center; 
            border-radius: 15px;
            background-color: rgb(0, 0, 0, 0.7);
            box-shadow: 0px 0px 10px 0px rgba(0, 0, 0, 0.5);
            color: #ffffff;
            text-align: center;
            line-height: 10px;
        }

        .menu img{
            position: absolute;
            top: 5px;
            left: 0;
            width: 40px;
            height: 40px;
        }

        center div{
            width: 90%;
            padding: 20px;
            padding-top: 20px;
            padding-bottom: 20px;
            align-items: center; 
            border-radius: 15px;
            background-color: rgb(0, 0, 0, 0.7);
            box-shadow: 0px 0px 10px 0px rgba(0, 0, 0, 0.5);
            color: #ffffff;
            text-align: center;
            line-height: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .game {
            width: 150px;
            height: 180px;
        }

        .game img{
            width: 90%;
            height: 80%;
            border-radius: 15px;
        }

        .game h4{
            margin-top: 10px;
        }

        .search-bar {
            width: 90%;
            margin: 0 auto 15px auto;
            display: block;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            background-color: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            font-family: Inter;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

    </style>
</head>
<body>
    <div class="menu">
        <img onclick="window.location='index.html'" src="./logo.png">
        <div style="float: right;">
            <span style="user-select: none; cursor: pointer;" onclick="window.location='games.html'">Games</span>
            <span>/</span>
            <span style="user-select: none; cursor: pointer;" onclick="window.location='chat.html'">Chat</span>
            <span>/</span>
            <span style="user-select: none; cursor: pointer;" onclick="window.location='links.html'">Links</span>
        </div>
    </div>

    <div style="margin-top: 100px;">
        <center>
            <div class="search-bar">
                <input type="text" id="search" placeholder="Search games..." oninput="filterGames()">
            </div>
            <div id="games">

            </div>
        </center>
    </div>
    <script>
        let allGames = [];

        fetch("games.json").then(response => response.json()).then(data => {
            allGames = data;
            renderGames(allGames);
        });

        function renderGames(games) {
            const container = document.getElementById("games");
            container.innerHTML = "";
            for (let game of games) {
                let div = document.createElement("div");
                div.className = "game";
                div.innerHTML = `
                        <img src="${game.icon}">
                        <h4>${game.name}</h4>

                `;
                div.onclick = () => {
                    window.location = "./play.html?url=" + btoa(game.url);
                };
                container.appendChild(div);
            }
        }

        function filterGames() {
            const query = document.getElementById("search").value.toLowerCase();
            const filtered = allGames.filter(game => game.name.toLowerCase().includes(query));
            renderGames(filtered);
        }
    </script>
    <script src="./scripts/global.js"></script>
</body>
</html>
